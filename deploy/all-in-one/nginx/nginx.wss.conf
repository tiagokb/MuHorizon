events { }

http {
    # Required for WebSocket proxying: map Upgrade header to connection directive.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 443 ssl;

        ssl_certificate     /etc/nginx/certs/localhost+1.pem;
        ssl_certificate_key /etc/nginx/certs/localhost+1-key.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers   HIGH:!aNULL:!MD5;

        # WebSocket proxy: wss://localhost/ws → ws://openmu-dev:5050/ws/
        location /ws {
            proxy_pass         http://openmu-dev:5050/ws/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
