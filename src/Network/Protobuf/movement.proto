syntax = "proto3";

package openmu.protocol;
option csharp_namespace = "MUnique.OpenMU.Network.Protobuf";

// C2S: player clicks a destination on the map.
// dest_x / dest_y are in world units (scale 1:8, range [0, 2040]).
// hint_pos_x / hint_pos_y are the client-predicted position at the time of the click.
message C2SMoveRequest {
    uint32 sequence_number = 1;
    float dest_x           = 2;
    float dest_y           = 3;
    float hint_pos_x       = 4;
    float hint_pos_y       = 5;
}

// Per-entity delta included in S2CSnapshot.
// pos_x / pos_y and vel_x / vel_y are in world units (scale 1:8).
// last_processed_seq is non-zero only for the local player's own delta.
message S2CEntityDelta {
    uint32 object_id          = 1;
    float  pos_x              = 2;
    float  pos_y              = 3;
    float  vel_x              = 4;
    float  vel_y              = 5;
    uint32 last_processed_seq = 6;
}

// Authoritative snapshot broadcast by the server at 30 Hz.
message S2CSnapshot {
    uint64                   server_tick  = 1;
    uint64                   timestamp_ms = 2;
    repeated S2CEntityDelta  entities     = 3;
}
